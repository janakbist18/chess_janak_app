name: chess_janak_app
description: Chess Janak - realtime online chess app with chat and WebRTC.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  firebase_core: ^4.5.0
  flutter_riverpod: ^2.4.0
  state_notifier: ^1.0.0
  go_router: ^14.2.6
  dio: ^5.9.2
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  web_socket_channel: ^3.0.3
  google_sign_in: ^6.2.0
  flutter_webrtc: ^1.3.0
  qr_flutter: ^4.1.0
  image_picker: ^1.1.2
  google_fonts: ^7.1.0
  intl: ^0.20.2
  share_plus: ^11.1.0
  uuid: ^4.5.1
  chess: ^0.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/sounds/
