name: chess_janak_app
description: A competitive chess application with real-time multiplayer gameplay.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Routing
  go_router: ^13.0.0

  # HTTP & Networking
  dio: ^5.3.0

  # WebSocket
  web_socket_channel: ^2.4.0

  # Local Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # Firebase
  firebase_core: ^2.21.0
  firebase_auth: ^4.13.0
  firebase_database: ^10.2.0
  firebase_storage: ^11.4.0
  google_sign_in: ^6.1.0

  # UI Components
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.0

  # Utilities
  intl: ^0.19.0
  formatters: ^0.0.5
  uuid: ^4.0.0

  # WebRTC
  flutter_webrtc: ^0.9.43

  # Audio
  just_audio: ^0.9.34

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  riverpod_generator: ^2.3.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/sounds/

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
